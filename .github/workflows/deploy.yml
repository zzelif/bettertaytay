name: Build and Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    name: Quality Gate
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Merge service data
        run: python3 scripts/merge_services.py

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check .

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    environment: ${{ github.event_name == 'pull_request' && 'preview' || 'production' }}
    needs: quality-gate
    permissions:
      contents: write
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Merge Service Data
        run: python3 scripts/merge_services.py

      - name: Build
        run: npm run build

      - name: Run Database Migrations (Production only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./scripts/migrate.sh remote --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CI: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=betterlb
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '4.70.0'
